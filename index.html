<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Bhumi ji 💝</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: linear-gradient(180deg, #2b0412 0%, #4a0e26 50%, #1a020a 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .scene-container {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 650px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box-wrapper {
            position: absolute;
            cursor: pointer;
            transition: all 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 10;
            text-align: center;
        }
        .gift-box {
            position: relative;
            width: 180px;
            height: 180px;
            background: #d63031;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }
        .gift-box::before {
            content: '';
            position: absolute;
            top: 0; left: 80px;
            width: 20px; height: 100%;
            background: #ffeaa7;
        }
        .gift-box::after {
            content: '';
            position: absolute;
            top: 80px; left: 0;
            width: 100%; height: 20px;
            background: #ffeaa7;
        }
        .box-lid {
            position: absolute;
            top: -15px; left: -10px;
            width: 200px; height: 25px;
            background: #d63031;
            border-bottom: 4px solid rgba(0,0,0,0.2);
            border-radius: 5px;
            z-index: 11;
        }
        .card-wrapper {
            position: absolute;
            width: 95%;
            height: 98%;
            background: linear-gradient(180deg, #fff0f5 0%, #ffe4e1 100%);
            border-radius: 24px;
            border: 8px solid #ff4d6d;
            padding: 25px 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            opacity: 0;
            transform: scale(0.2) translateY(300px);
            transition: all 0.9s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            z-index: 5;
        }
        .ribbon-header {
            background: linear-gradient(90deg, #ff2a5f, #ff4d6d, #ff2a5f);
            color: white;
            padding: 8px 35px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 30px;
            box-shadow: 0 6px 12px rgba(255, 77, 109, 0.4);
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
        }
        .center-name {
            font-size: 40px;
            color: #ff2a5f;
            font-weight: 800;
            font-style: italic;
            margin: 5px 0;
            text-shadow: 1px 1px 0px #fff, 3px 3px 0px #ffccd5;
            text-align: center;
        }
        .hearts-container {
            position: relative;
            width: 100%;
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .bear-animation-area {
            width: 90%;
            height: 220px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: white;
            border-radius: 20px;
            border: 3px dashed #ff85a1;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.05);
            overflow: hidden;
            z-index: 2;
        }
        
        /* 100% Crash-proof pure CSS backup beating heart */
        .fallback-heart {
            font-size: 80px;
            animation: heartBeatEffect 1.2s infinite cubic-bezier(0.215, 0.610, 0.355, 1);
        }

        .ambient-heart {
            position: absolute;
            font-size: 24px;
            animation: pulse 1.5s infinite ease-in-out;
            z-index: 1;
        }
        .h1 { top: 15px; left: 15px; animation-delay: 0s; }
        .h2 { top: 30px; right: 20px; animation-delay: 0.3s; }
        .h3 { bottom: 20px; left: 25px; animation-delay: 0.6s; }
        .h4 { bottom: 15px; right: 15px; animation-delay: 0.9s; }
        
        .text-footer-group {
            width: 100%;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .sorry-text {
            font-size: 26px;
            font-weight: bold;
            color: #c9184a;
            letter-spacing: 1px;
        }
        .custom-puchku-message {
            font-size: 20px;
            color: #594a4e;
            font-weight: 700;
            line-height: 1.4;
        }
        .particle-heart {
            position: absolute;
            color: #ff4d6d;
            font-size: 20px;
            pointer-events: none;
            animation: floatUp 2s forwards ease-out;
            z-index: 99;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        @keyframes heartBeatEffect {
            0% { transform: scale(0.95); }
            5% { transform: scale(1.1); }
            39% { transform: scale(0.85); }
            45% { transform: scale(1.05); }
            60% { transform: scale(0.95); }
            100% { transform: scale(0.95); }
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-150px) scale(1.5); opacity: 0; }
        }
        .scene-container.opened .box-wrapper {
            transform: scale(0) rotate(-15deg);
            opacity: 0;
            pointer-events: none;
        }
        .scene-container.opened .card-wrapper {
            opacity: 1;
            transform: scale(1) translateY(0);
            pointer-events: auto;
        }
    </style>
</head>
<body>
    <div class="scene-container" id="sceneContainer">
        <div class="box-wrapper" id="giftBox" onclick="openBox(event)">
            <div class="box-lid"></div>
            <div class="gift-box"></div>
            <p style="color: #ffccd5; text-align: center; margin-top: 15px; font-weight: bold; font-size: 18px; text-shadow: 0 2px 4px rgba(0,0,0,0.5)">Tap to open your gift 🎁</p>
        </div>
        <div class="card-wrapper">
            <div class="ribbon-header">I am So Sorry</div>
            <div class="center-name">Bhumi ji💝💝</div>
            <div class="hearts-container">
                <span class="ambient-heart h1">💖</span>
                <span class="ambient-heart h2">💝</span>
                <span class="ambient-heart h3">✨</span>
                <span class="ambient-heart h4">💕</span>
                <div class="bear-animation-area">
                    <!-- Embedded Base64 / Pure Browser Native Fallback Component -->
                    <div class="fallback-heart">💝</div>
                </div>
            </div>
            <div class="text-footer-group">
                <div class="sorry-text">Please Forgive Me! 🥺</div>
                <div class="custom-puchku-message">Love You my puchku💝💝😘</div>
            </div>
        </div>
    </div>
    <script>
        function openBox(e) {
            document.getElementById('sceneContainer').classList.add('opened');
            for(let i = 0; i < 15; i++) {
                setTimeout(() => {
                    createHeart(e.clientX || window.innerWidth/2, e.clientY || window.innerHeight/2);
                }, i * 60);
            }
        }
        function createHeart(x, y) {
            const heart = document.createElement('div');
            heart.classList.add('particle-heart');
            heart.innerHTML = ['💝','💖','❤️','😘'][Math.floor(Math.random() * 4)];
            heart.style.left = (x - 10 + (Math.random() * 100 - 50)) + 'px';
            heart.style.top = (y - 10 + (Math.random() * 100 - 50)) + 'px';
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 2000);
        }
    </script>
</body>
</html>
